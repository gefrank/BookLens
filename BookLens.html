<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1208">
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<title>BookLens</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1208;
    --paper: #f5f0e8;
    --paper2: #ede7d5;
    --amber: #c8902a;
    --amber-light: #e8b84b;
    --amber-dim: #7a5518;
    --rust: #9c3d1a;
    --cream: #faf7f0;
    --shadow: rgba(26,18,8,0.35);
  }

  html, body {
    height: 100%;
    background: var(--ink);
    color: var(--paper);
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    touch-action: manipulation;
  }

  /* ── SCREENS ── */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    transition: opacity 0.3s, transform 0.3s;
  }
  .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(8px); }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(180deg, #0f0b05 0%, #1a1208 100%);
    border-bottom: 1px solid var(--amber-dim);
    padding: 14px 18px 10px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--amber-light);
    letter-spacing: 0.5px;
    flex: 1;
  }
  .logo span { font-style: italic; color: var(--amber); }
  .header-btn {
    background: none; border: 1px solid var(--amber-dim);
    color: var(--amber); padding: 6px 14px; border-radius: 3px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
    transition: all 0.15s;
  }
  .header-btn:active { background: var(--amber-dim); }

  /* ── HOME ── */
  #home {
    background: radial-gradient(ellipse at 30% 20%, #2a1f0a 0%, var(--ink) 60%);
    justify-content: center; align-items: center; gap: 0;
  }
  .home-content { width: 100%; max-width: 420px; padding: 32px 24px; }
  .tagline {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--amber-dim);
    text-align: center;
    margin-bottom: 40px;
    letter-spacing: 0.3px;
  }
  .main-actions { display: flex; flex-direction: column; gap: 14px; }
  .action-btn {
    display: flex; align-items: center; gap: 16px;
    background: linear-gradient(135deg, #241a08 0%, #1a1208 100%);
    border: 1px solid var(--amber-dim);
    border-radius: 4px; padding: 18px 20px;
    cursor: pointer; text-decoration: none; color: inherit;
    transition: all 0.2s; position: relative; overflow: hidden;
  }
  .action-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(200,144,42,0.08) 0%, transparent 60%);
    opacity: 0; transition: opacity 0.2s;
  }
  .action-btn:active::before { opacity: 1; }
  .action-btn:active { border-color: var(--amber); transform: scale(0.99); }
  .action-icon { font-size: 26px; flex-shrink: 0; }
  .action-label { font-size: 13px; color: var(--paper); letter-spacing: 0.5px; }
  .action-sub { font-size: 10px; color: var(--amber-dim); margin-top: 2px; letter-spacing: 0.3px; }
  .divider {
    text-align: center; font-size: 10px; color: var(--amber-dim);
    letter-spacing: 2px; margin: 4px 0;
  }
  .gallery-btn {
    margin-top: 8px;
    background: none; border: 1px solid #2e2210;
    color: var(--amber-dim); padding: 12px 20px;
    border-radius: 4px; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; cursor: pointer; text-transform: uppercase;
    letter-spacing: 1.5px; width: 100%; transition: all 0.2s;
  }
  .gallery-btn:active { border-color: var(--amber-dim); color: var(--amber); }
  .gallery-count {
    background: var(--amber); color: var(--ink); font-size: 9px;
    border-radius: 10px; padding: 1px 6px; margin-left: 6px;
    font-weight: bold;
  }

  /* ── CAMERA ── */
  #camera { background: #000; justify-content: space-between; }
  #video {
    flex: 1; width: 100%; object-fit: cover;
    background: #000;
  }
  .camera-controls {
    background: linear-gradient(0deg, #000 0%, rgba(0,0,0,0.85) 100%);
    padding: 20px 24px 36px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .cam-side-btn {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    color: #fff; width: 48px; height: 48px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; cursor: pointer; transition: all 0.15s;
  }
  .cam-side-btn:active { background: rgba(255,255,255,0.2); }
  .shutter {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--paper); border: 4px solid rgba(255,255,255,0.3);
    cursor: pointer; transition: all 0.1s; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .shutter:active { transform: scale(0.92); background: var(--amber-light); }
  .shutter-inner {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--paper); border: 2px solid rgba(0,0,0,0.1);
  }
  #canvas { display: none; }

  /* ── CROP ── */
  #crop {
    background: #0a0805;
    overflow: hidden;
  }
  .crop-header {
    background: #0f0b05;
    border-bottom: 1px solid var(--amber-dim);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .crop-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px; color: var(--amber-light); flex: 1;
  }
  .crop-btn {
    background: none; border: 1px solid var(--amber-dim);
    color: var(--amber); padding: 7px 16px; border-radius: 3px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    cursor: pointer; letter-spacing: 0.5px; text-transform: uppercase;
    transition: all 0.15s;
  }
  .crop-btn.primary {
    background: var(--amber); color: var(--ink);
    border-color: var(--amber); font-weight: bold;
  }
  .crop-btn:active { opacity: 0.75; }

  .crop-workspace {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    position: relative;
    background: #050402;
    touch-action: none;
  }

  #cropImg {
    position: absolute;
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    user-select: none;
    -webkit-user-drag: none;
    transform-origin: center center;
    will-change: transform;
  }

  /* zoom level indicator — shows briefly when pinching */
  .zoom-badge {
    position: absolute; top: 12px; right: 12px;
    background: rgba(26,18,8,0.8); color: var(--amber-light);
    font-size: 11px; padding: 4px 10px; border-radius: 3px;
    border: 1px solid var(--amber-dim);
    pointer-events: none; opacity: 0; transition: opacity 0.3s;
    z-index: 10; font-family: 'JetBrains Mono', monospace;
  }
  .zoom-badge.show { opacity: 1; }

  .crop-overlay {
    position: absolute; inset: 0;
    pointer-events: none;
  }

  .crop-box {
    position: absolute;
    border: 2.5px solid var(--amber-light);
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.6);
    cursor: move;
    touch-action: none;
  }
  .crop-box.moving { cursor: grabbing; }

  /* big corner-only handles — easy to grab with a finger */
  .handle {
    position: absolute;
    width: 40px; height: 40px;
    background: rgba(232,184,75,0.3);
    border: 3px solid var(--amber-light);
    border-radius: 50%;
    touch-action: none;
  }
  .handle.tl { top: -20px; left: -20px; cursor: nwse-resize; }
  .handle.tr { top: -20px; right: -20px; cursor: nesw-resize; }
  .handle.bl { bottom: -20px; left: -20px; cursor: nesw-resize; }
  .handle.br { bottom: -20px; right: -20px; cursor: nwse-resize; }

  .rule-thirds {
    position: absolute; inset: 0; pointer-events: none;
    display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr);
  }
  .rule-thirds > div {
    border: 0.5px solid rgba(200,144,42,0.2);
  }

  .crop-footer {
    background: #0f0b05;
    border-top: 1px solid #2e2210;
    padding: 10px 16px;
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0; flex-wrap: wrap;
  }
  .ratio-btn {
    background: none; border: 1px solid #2e2210;
    color: var(--amber-dim); padding: 5px 10px; border-radius: 3px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    cursor: pointer; letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .ratio-btn.active {
    border-color: var(--amber); color: var(--amber-light);
    background: rgba(200,144,42,0.08);
  }
  .ratio-btn:active { opacity: 0.7; }
  .straighten-wrap { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .straighten-label { font-size: 9px; color: var(--amber-dim); text-transform: uppercase; letter-spacing: 1px; }
  .degree-readout {
    font-size: 10px; color: var(--amber-light); min-width: 36px;
    text-align: right; font-family: 'JetBrains Mono', monospace;
  }
  #straightenRange {
    -webkit-appearance: none; width: 100px; height: 3px;
    background: var(--amber-dim); border-radius: 2px; outline: none;
  }
  #straightenRange::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px;
    border-radius: 50%; background: var(--amber-light);
    cursor: pointer;
  }

  /* ── ENHANCE ── */
  #enhance {
    background: #0a0805;
    overflow: hidden;
  }
  .enhance-header {
    background: #0f0b05;
    border-bottom: 1px solid var(--amber-dim);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .enhance-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px; color: var(--amber-light); flex: 1;
  }
  .enhance-preview {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    position: relative;
    background: #050402;
  }
  #enhanceCanvas {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
  }
  .enhance-controls {
    background: #0f0b05;
    border-top: 1px solid #2e2210;
    padding: 12px 16px 16px;
    flex-shrink: 0;
    overflow-y: auto;
    max-height: 45vh;
  }
  .preset-row {
    display: flex; gap: 8px; margin-bottom: 14px;
    overflow-x: auto;
  }
  .preset-btn {
    background: none; border: 1px solid #2e2210;
    color: var(--amber-dim); padding: 8px 14px; border-radius: 3px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    cursor: pointer; letter-spacing: 0.5px; text-transform: uppercase;
    transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
  }
  .preset-btn.active {
    border-color: var(--amber); color: var(--amber-light);
    background: rgba(200,144,42,0.1);
  }
  .preset-btn:active { opacity: 0.7; }
  .slider-group {
    display: flex; flex-direction: column; gap: 10px;
  }
  .slider-row {
    display: flex; align-items: center; gap: 10px;
  }
  .slider-label {
    font-size: 9px; color: var(--amber-dim); text-transform: uppercase;
    letter-spacing: 1px; min-width: 72px;
  }
  .slider-row input[type="range"] {
    -webkit-appearance: none; flex: 1; height: 3px;
    background: var(--amber-dim); border-radius: 2px; outline: none;
  }
  .slider-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px;
    border-radius: 50%; background: var(--amber-light); cursor: pointer;
  }
  .slider-value {
    font-size: 10px; color: var(--amber-light); min-width: 28px;
    text-align: right; font-family: 'JetBrains Mono', monospace;
  }
  .enhance-processing {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: rgba(26,18,8,0.85); color: var(--amber-light);
    font-size: 11px; padding: 8px 16px; border-radius: 3px;
    border: 1px solid var(--amber-dim); pointer-events: none;
    opacity: 0; transition: opacity 0.2s;
    font-family: 'JetBrains Mono', monospace;
  }
  .enhance-processing.show { opacity: 1; }

  /* ── GALLERY ── */
  #gallery { background: var(--ink); }
  .gallery-grid {
    flex: 1; overflow-y: auto; padding: 14px;
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
    align-content: start;
  }
  .gallery-item {
    position: relative; border-radius: 3px; overflow: hidden;
    border: 1px solid #2e2210; aspect-ratio: 4/3;
    cursor: pointer; background: #0a0805;
    transition: all 0.15s;
  }
  .gallery-item:active { transform: scale(0.97); }
  .gallery-item img {
    width: 100%; height: 100%; object-fit: cover;
    display: block;
  }
  .gallery-item-actions {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 100%);
    padding: 20px 8px 8px;
    display: flex; gap: 6px; justify-content: flex-end;
    opacity: 0; transition: opacity 0.2s;
  }
  .gallery-item:hover .gallery-item-actions,
  .gallery-item.selected .gallery-item-actions { opacity: 1; }
  .item-btn {
    background: rgba(200,144,42,0.2); border: 1px solid var(--amber-dim);
    color: var(--amber); padding: 4px 8px; border-radius: 2px;
    font-size: 10px; cursor: pointer; font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
  }
  .item-btn:active { background: var(--amber-dim); }
  .empty-gallery {
    grid-column: 1/-1; text-align: center; padding: 60px 20px;
    color: var(--amber-dim); font-size: 12px; letter-spacing: 1px;
  }
  .empty-gallery p:first-child { font-size: 32px; margin-bottom: 16px; }

  /* ── OCR OVERLAY ── */
  #ocrOverlay {
    position: fixed; inset: 0;
    background: rgba(10,8,5,0.95);
    display: flex; flex-direction: column;
    z-index: 500;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  #ocrOverlay.show { opacity: 1; pointer-events: auto; }
  .ocr-header {
    background: #0f0b05;
    border-bottom: 1px solid var(--amber-dim);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .ocr-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px; color: var(--amber-light); flex: 1;
  }
  .ocr-body {
    flex: 1; display: flex; flex-direction: column;
    padding: 16px; gap: 12px; overflow: hidden;
  }
  #ocrText {
    flex: 1; resize: none;
    background: #1a1208; color: var(--paper);
    border: 1px solid var(--amber-dim); border-radius: 3px;
    padding: 14px; font-family: 'JetBrains Mono', monospace;
    font-size: 13px; line-height: 1.6;
    outline: none;
  }
  #ocrText:focus { border-color: var(--amber); }
  .ocr-actions {
    display: flex; gap: 8px; flex-shrink: 0;
  }
  .ocr-actions button {
    flex: 1;
  }
  .ocr-progress {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 12px; flex: 1;
  }
  .ocr-progress-bar {
    width: 80%; max-width: 300px; height: 4px;
    background: #2e2210; border-radius: 2px; overflow: hidden;
  }
  .ocr-progress-fill {
    height: 100%; background: var(--amber-light);
    border-radius: 2px; transition: width 0.2s;
    width: 0%;
  }
  .ocr-progress-label {
    font-size: 11px; color: var(--amber-dim);
    letter-spacing: 0.5px; text-transform: uppercase;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--amber); color: var(--ink);
    padding: 9px 20px; border-radius: 3px;
    font-size: 12px; letter-spacing: 0.5px; font-weight: bold;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
    z-index: 1000; white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* ── FILE INPUT ── */
  #fileInput { display: none; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--amber-dim); border-radius: 2px; }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen">
  <div class="home-content">
    <div class="logo">Book<span>Lens</span></div>
    <div class="tagline">"Capture the word, keep the thought."</div>
    <div class="main-actions">
      <button class="action-btn" onclick="startCamera()">
        <span class="action-icon">📷</span>
        <div>
          <div class="action-label">CAPTURE</div>
          <div class="action-sub">Use camera to photograph a page</div>
        </div>
      </button>
      <div class="divider">— or —</div>
      <label class="action-btn" for="fileInput">
        <span class="action-icon">🖼️</span>
        <div>
          <div class="action-label">IMPORT</div>
          <div class="action-sub">Select image from gallery</div>
        </div>
      </label>
      <button class="gallery-btn" onclick="showScreen('gallery'); renderGallery()">
        📚 SAVED QUOTES <span class="gallery-count" id="galleryCount">0</span>
      </button>
    </div>
  </div>
</div>

<!-- CAMERA -->
<div id="camera" class="screen hidden">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div class="camera-controls">
    <button class="cam-side-btn" onclick="stopCamera(); showScreen('home')" title="Back">✕</button>
    <button class="shutter" onclick="capturePhoto()">
      <div class="shutter-inner"></div>
    </button>
    <div style="width:48px;"></div>
  </div>
</div>

<!-- ENHANCE -->
<div id="enhance" class="screen hidden">
  <div class="enhance-header">
    <span class="enhance-title">Enhance</span>
    <button class="crop-btn" onclick="skipEnhance()">Skip</button>
    <button class="crop-btn primary" onclick="applyEnhance()">Apply</button>
  </div>

  <div class="enhance-preview">
    <canvas id="enhanceCanvas"></canvas>
    <div class="enhance-processing" id="enhanceSpinner">Processing...</div>
  </div>

  <div class="enhance-controls">
    <div class="preset-row">
      <button class="preset-btn active" data-preset="original" onclick="setPreset('original',this)">Original</button>
      <button class="preset-btn" data-preset="auto" onclick="setPreset('auto',this)">Auto</button>
      <button class="preset-btn" data-preset="document" onclick="setPreset('document',this)">Document</button>
      <button class="preset-btn" data-preset="photo" onclick="setPreset('photo',this)">Photo</button>
      <button class="preset-btn" data-preset="bw" onclick="setPreset('bw',this)">B&W</button>
    </div>
    <div class="slider-group">
      <div class="slider-row">
        <span class="slider-label">Brightness</span>
        <input type="range" id="brightnessSlider" min="-100" max="100" value="0" oninput="onSliderChange()">
        <span class="slider-value" id="brightnessVal">0</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">Contrast</span>
        <input type="range" id="contrastSlider" min="-100" max="100" value="0" oninput="onSliderChange()">
        <span class="slider-value" id="contrastVal">0</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">Sharpness</span>
        <input type="range" id="sharpnessSlider" min="0" max="100" value="0" oninput="onSliderChange()">
        <span class="slider-value" id="sharpnessVal">0</span>
      </div>
    </div>
  </div>
</div>

<!-- CROP -->
<div id="crop" class="screen hidden">
  <div class="crop-header">
    <span class="crop-title">Crop</span>
    <button class="crop-btn" onclick="cancelCrop()">Cancel</button>
    <button class="crop-btn primary" onclick="saveCrop()">Save ↓</button>
  </div>

  <div class="crop-workspace" id="cropWorkspace">
    <img id="cropImg" src="" alt="crop target" draggable="false">
    <div class="zoom-badge" id="zoomBadge">1.0×</div>
    <div class="crop-box" id="cropBox">
      <div class="rule-thirds">
        <div></div><div></div><div></div>
        <div></div><div></div><div></div>
        <div></div><div></div><div></div>
      </div>
      <div class="handle tl" data-handle="tl"></div>
      <div class="handle tr" data-handle="tr"></div>
      <div class="handle bl" data-handle="bl"></div>
      <div class="handle br" data-handle="br"></div>
    </div>
  </div>

  <div class="crop-footer">
    <button class="ratio-btn active" data-ratio="free" onclick="setRatio('free',this)">FREE</button>
    <button class="ratio-btn" data-ratio="1:1" onclick="setRatio('1:1',this)">1:1</button>
    <button class="ratio-btn" data-ratio="4:3" onclick="setRatio('4:3',this)">4:3</button>
    <button class="ratio-btn" data-ratio="16:9" onclick="setRatio('16:9',this)">16:9</button>
    <button class="ratio-btn" data-ratio="3:2" onclick="setRatio('3:2',this)">3:2</button>
    <div class="straighten-wrap">
      <span class="straighten-label">Angle</span>
      <input type="range" id="straightenRange" min="-15" max="15" value="0" step="0.5" oninput="applyRotation(this.value)">

</div>

<div id="toast"></div>
<input type="file" id="fileInput" accept="image/*" capture="">

<script>
// ── STATE ──
let stream = null;
let cropImgDataURL = null, cropRatio = 'free', cropRotation = 0;
let box = { x: 10, y: 10, w: 80, h: 80 };
let saved = JSON.parse(localStorage.getItem('booklens_saves') || '[]');

// zoom and pan state for the crop workspace
let zoomScale = 1;
let panX = 0, panY = 0;
const ZOOM_MIN = 1, ZOOM_MAX = 5;

// enhancement state — tracks what the user's doing on the enhance screen
let enhanceSourceDataURL = null;   // original image before any enhancement
let enhanceSourceImg = null;       // cached Image object for reprocessing
let enhancePreset = 'original';
let enhanceBrightness = 0, enhanceContrast = 0, enhanceSharpness = 0;
let enhanceDebounceTimer = null;

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.toggle('hidden', s.id !== id);
  });
  updateCount();
}

function updateCount() {
  document.getElementById('galleryCount').textContent = saved.length;
}

// ── CAMERA ──
async function startCamera() {
  showScreen('camera');
  try {
    // lower resolution hint lets Chrome prioritize autofocus over megapixels
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 960 } },
      audio: false
    });
    document.getElementById('video').srcObject = stream;

    // ask for continuous autofocus if the device supports it
    const track = stream.getVideoTracks()[0];
    const caps = track.getCapabilities ? track.getCapabilities() : {};
    if (caps.focusMode && caps.focusMode.includes('continuous')) {
      track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }).catch(() => {});
    }
  } catch(e) {
    showToast('Camera access denied');
    showScreen('home');
  }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
}

function capturePhoto() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const dataURL = canvas.toDataURL('image/jpeg', 0.95);
  stopCamera();
  openEnhance(dataURL);
}

// ── FILE IMPORT ──
document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => openEnhance(ev.target.result);
  reader.readAsDataURL(file);
  e.target.value = '';
});

// ── ENHANCE ──
// opens the enhancement screen with the captured/imported image
function openEnhance(dataURL) {
  enhanceSourceDataURL = dataURL;
  enhancePreset = 'original';
  enhanceBrightness = 0;
  enhanceContrast = 0;
  enhanceSharpness = 0;

  // reset all the UI controls
  document.getElementById('brightnessSlider').value = 0;
  document.getElementById('contrastSlider').value = 0;
  document.getElementById('sharpnessSlider').value = 0;
  document.getElementById('brightnessVal').textContent = '0';
  document.getElementById('contrastVal').textContent = '0';
  document.getElementById('sharpnessVal').textContent = '0';
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-preset="original"]').classList.add('active');

  // load the source image so we can draw it to the preview canvas
  enhanceSourceImg = new Image();
  enhanceSourceImg.onload = () => {
    renderEnhancePreview();
    showScreen('enhance');
  };
  enhanceSourceImg.src = dataURL;
}

// user tapped "Skip" — go straight to crop with the original image
function skipEnhance() {
  openCrop(enhanceSourceDataURL);
}

// user tapped "Apply" — render at full resolution and send to crop
function applyEnhance() {
  const spinner = document.getElementById('enhanceSpinner');
  spinner.textContent = 'Applying at full resolution...';
  spinner.classList.add('show');

  // give the spinner a frame to show up before we do the heavy processing
  requestAnimationFrame(() => {
    const srcW = enhanceSourceImg.naturalWidth;
    const srcH = enhanceSourceImg.naturalHeight;
    const offCanvas = document.createElement('canvas');
    offCanvas.width = srcW;
    offCanvas.height = srcH;
    const ctx = offCanvas.getContext('2d');
    ctx.drawImage(enhanceSourceImg, 0, 0, srcW, srcH);

    // re-run the same pipeline but at full resolution
    let imageData = ctx.getImageData(0, 0, srcW, srcH);
    const pixels = imageData.data;

    if (enhancePreset === 'auto' || enhancePreset === 'document') {
      applyAutoLevels(pixels);
    }
    if (enhancePreset === 'document') {
      applyDesaturate(pixels, 0.7);
    }
    if (enhancePreset === 'bw') {
      applyDesaturate(pixels, 1.0);
    }
    if (enhanceBrightness !== 0) {
      applyBrightness(pixels, enhanceBrightness);
    }
    if (enhanceContrast !== 0) {
      applyContrast(pixels, enhanceContrast);
    }
    ctx.putImageData(imageData, 0, 0);
    if (enhanceSharpness > 0) {
      applySharpen(ctx, srcW, srcH, enhanceSharpness / 100);
    }

    const enhancedDataURL = offCanvas.toDataURL('image/jpeg', 0.95);
    spinner.classList.remove('show');
    spinner.textContent = 'Processing...';
    openCrop(enhancedDataURL);
  });
}

// preset button handler — sets slider values to match the preset
function setPreset(preset, btn) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  enhancePreset = preset;

  // each preset configures the sliders to sensible defaults
  if (preset === 'original') {
    enhanceBrightness = 0; enhanceContrast = 0; enhanceSharpness = 0;
  } else if (preset === 'auto') {
    enhanceBrightness = 10; enhanceContrast = 20; enhanceSharpness = 15;
  } else if (preset === 'document') {
    enhanceBrightness = 15; enhanceContrast = 60; enhanceSharpness = 40;
  } else if (preset === 'photo') {
    enhanceBrightness = 5; enhanceContrast = 15; enhanceSharpness = 10;
  } else if (preset === 'bw') {
    enhanceBrightness = 10; enhanceContrast = 30; enhanceSharpness = 20;
  }

  // sync sliders to match
  document.getElementById('brightnessSlider').value = enhanceBrightness;
  document.getElementById('contrastSlider').value = enhanceContrast;
  document.getElementById('sharpnessSlider').value = enhanceSharpness;
  document.getElementById('brightnessVal').textContent = enhanceBrightness;
  document.getElementById('contrastVal').textContent = enhanceContrast;
  document.getElementById('sharpnessVal').textContent = enhanceSharpness;

  renderEnhancePreview();
}

// fires when any slider is dragged — debounce to avoid hammering the canvas
function onSliderChange() {
  enhanceBrightness = Number(document.getElementById('brightnessSlider').value);
  enhanceContrast = Number(document.getElementById('contrastSlider').value);
  enhanceSharpness = Number(document.getElementById('sharpnessSlider').value);

  document.getElementById('brightnessVal').textContent = enhanceBrightness;
  document.getElementById('contrastVal').textContent = enhanceContrast;
  document.getElementById('sharpnessVal').textContent = enhanceSharpness;

  // if sliders were manually moved, clear the preset highlight
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));

  clearTimeout(enhanceDebounceTimer);
  enhanceDebounceTimer = setTimeout(renderEnhancePreview, 100);
}

// main render pipeline — applies all enhancements to the preview canvas
function renderEnhancePreview() {
  if (!enhanceSourceImg) return;
  const spinner = document.getElementById('enhanceSpinner');
  spinner.classList.add('show');

  // use requestAnimationFrame so the spinner actually shows up before we block
  requestAnimationFrame(() => {
    const canvas = document.getElementById('enhanceCanvas');
    const srcW = enhanceSourceImg.naturalWidth;
    const srcH = enhanceSourceImg.naturalHeight;

    // work at display resolution for speed — cap the preview size
    const maxDim = 1200;
    const scale = Math.min(1, maxDim / Math.max(srcW, srcH));
    const w = Math.round(srcW * scale);
    const h = Math.round(srcH * scale);
    canvas.width = w;
    canvas.height = h;

    const ctx = canvas.getContext('2d');
    ctx.drawImage(enhanceSourceImg, 0, 0, w, h);

    let imageData = ctx.getImageData(0, 0, w, h);
    const pixels = imageData.data;

    // auto-levels if using a preset that calls for it
    if (enhancePreset === 'auto' || enhancePreset === 'document') {
      applyAutoLevels(pixels);
    }

    // document mode desaturation — lerp 70% toward grayscale
    if (enhancePreset === 'document') {
      applyDesaturate(pixels, 0.7);
    }

    // full B&W desaturation
    if (enhancePreset === 'bw') {
      applyDesaturate(pixels, 1.0);
    }

    // brightness adjustment
    if (enhanceBrightness !== 0) {
      applyBrightness(pixels, enhanceBrightness);
    }

    // contrast adjustment
    if (enhanceContrast !== 0) {
      applyContrast(pixels, enhanceContrast);
    }

    // write back before sharpening (sharpen reads neighbors so needs a clean pass)
    ctx.putImageData(imageData, 0, 0);

    // sharpening — applied as a separate pass since it reads neighboring pixels
    if (enhanceSharpness > 0) {
      applySharpen(ctx, w, h, enhanceSharpness / 100);
    }

    spinner.classList.remove('show');
  });
}

// ── IMAGE PROCESSING FUNCTIONS ──

// auto-levels: stretch each channel's histogram to fill 0–255
// uses 1st and 99th percentile to ignore outlier pixels
function applyAutoLevels(pixels) {
  const len = pixels.length;
  const histR = new Uint32Array(256);
  const histG = new Uint32Array(256);
  const histB = new Uint32Array(256);
  const totalPixels = len / 4;

  // build per-channel histograms
  for (let i = 0; i < len; i += 4) {
    histR[pixels[i]]++;
    histG[pixels[i + 1]]++;
    histB[pixels[i + 2]]++;
  }

  // find the 1st and 99th percentile for each channel
  function findPercentiles(hist) {
    const lo_target = totalPixels * 0.01;
    const hi_target = totalPixels * 0.99;
    let lo = 0, hi = 255, cumulative = 0;
    for (let i = 0; i < 256; i++) {
      cumulative += hist[i];
      if (cumulative < lo_target) lo = i;
      if (cumulative < hi_target) hi = i;
    }
    return [lo, Math.max(lo + 1, hi)];
  }

  const [rLo, rHi] = findPercentiles(histR);
  const [gLo, gHi] = findPercentiles(histG);
  const [bLo, bHi] = findPercentiles(histB);

  // stretch each channel so the percentile range fills 0–255
  for (let i = 0; i < len; i += 4) {
    pixels[i]     = Math.max(0, Math.min(255, ((pixels[i]     - rLo) / (rHi - rLo)) * 255));
    pixels[i + 1] = Math.max(0, Math.min(255, ((pixels[i + 1] - gLo) / (gHi - gLo)) * 255));
    pixels[i + 2] = Math.max(0, Math.min(255, ((pixels[i + 2] - bLo) / (bHi - bLo)) * 255));
  }
}

// desaturate by lerping each pixel toward its luminance value
// amount=1.0 is full grayscale, 0.5 is halfway
function applyDesaturate(pixels, amount) {
  const len = pixels.length;
  for (let i = 0; i < len; i += 4) {
    // standard luminance weights
    const gray = pixels[i] * 0.299 + pixels[i + 1] * 0.587 + pixels[i + 2] * 0.114;
    pixels[i]     = pixels[i]     + (gray - pixels[i])     * amount;
    pixels[i + 1] = pixels[i + 1] + (gray - pixels[i + 1]) * amount;
    pixels[i + 2] = pixels[i + 2] + (gray - pixels[i + 2]) * amount;
  }
}

// brightness: simple addition to each channel, clamped to 0–255
function applyBrightness(pixels, value) {
  // scale the slider value so ±100 maps to roughly ±75 in pixel space
  const adj = value * 0.75;
  const len = pixels.length;
  for (let i = 0; i < len; i += 4) {
    pixels[i]     = Math.max(0, Math.min(255, pixels[i]     + adj));
    pixels[i + 1] = Math.max(0, Math.min(255, pixels[i + 1] + adj));
    pixels[i + 2] = Math.max(0, Math.min(255, pixels[i + 2] + adj));
  }
}

// contrast: scale each channel's distance from 128
function applyContrast(pixels, value) {
  // convert slider range (-100 to 100) to a multiplier
  // 0 = no change, 100 = roughly 2.5× contrast
  const factor = (259 * (value + 255)) / (255 * (259 - value));
  const len = pixels.length;
  for (let i = 0; i < len; i += 4) {
    pixels[i]     = Math.max(0, Math.min(255, factor * (pixels[i]     - 128) + 128));
    pixels[i + 1] = Math.max(0, Math.min(255, factor * (pixels[i + 1] - 128) + 128));
    pixels[i + 2] = Math.max(0, Math.min(255, factor * (pixels[i + 2] - 128) + 128));
  }
}

// sharpen using a 3×3 unsharp-mask-style kernel
// strength 0–1 controls how much of the sharpening to blend in
function applySharpen(ctx, w, h, strength) {
  if (strength <= 0) return;

  const src = ctx.getImageData(0, 0, w, h);
  const dst = ctx.createImageData(w, h);
  const s = src.data, d = dst.data;

  // the classic sharpen kernel: [0,-1,0,-1,5,-1,0,-1,0]
  // we blend between original and sharpened based on strength
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const idx = (y * w + x) * 4;

      if (x === 0 || x === w - 1 || y === 0 || y === h - 1) {
        // edge pixels stay unchanged — no neighbors to convolve with
        d[idx] = s[idx]; d[idx+1] = s[idx+1];
        d[idx+2] = s[idx+2]; d[idx+3] = s[idx+3];
        continue;
      }

      // grab the neighbor indices
      const t = ((y-1) * w + x) * 4;   // top
      const b = ((y+1) * w + x) * 4;   // bottom
      const l = (y * w + (x-1)) * 4;   // left
      const r = (y * w + (x+1)) * 4;   // right

      for (let c = 0; c < 3; c++) {
        // apply the kernel: center*5 - top - bottom - left - right
        const sharp = s[idx+c] * 5 - s[t+c] - s[b+c] - s[l+c] - s[r+c];
        // blend between original and sharpened
        d[idx+c] = Math.max(0, Math.min(255,
          s[idx+c] + (sharp - s[idx+c]) * strength
        ));
      }
      d[idx+3] = 255;
    }
  }
  ctx.putImageData(dst, 0, 0);
}

// ── CROP ──
function openCrop(dataURL) {
  cropImgDataURL = dataURL;
  cropRotation = 0;
  // reset zoom and pan so every new image starts fresh
  zoomScale = 1;
  panX = 0;
  panY = 0;
  document.getElementById('straightenRange').value = 0;
  document.getElementById('degreeReadout').textContent = '0°';
  const img = document.getElementById('cropImg');
  img.src = dataURL;
  img.onload = () => {
    box = { x: 5, y: 5, w: 90, h: 90 };
    applyCropTransform();
    updateCropBox();
    showScreen('crop');
  };
  document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-ratio="free"]').classList.add('active');
  cropRatio = 'free';
}

function cancelCrop() {
  cropImgDataURL = null;
  showScreen('home');
}

function updateCropBox() {
  const cropBox = document.getElementById('cropBox');
  const imgR = document.getElementById('cropImg').getBoundingClientRect();
  const workR = document.getElementById('cropWorkspace').getBoundingClientRect();
  const offX = imgR.left - workR.left;
  const offY = imgR.top - workR.top;
  const px = offX + (box.x / 100) * imgR.width;
  const py = offY + (box.y / 100) * imgR.height;
  const pw = (box.w / 100) * imgR.width;
  const ph = (box.h / 100) * imgR.height;
  cropBox.style.left = px + 'px';
  cropBox.style.top = py + 'px';
  cropBox.style.width = pw + 'px';
  cropBox.style.height = ph + 'px';
}

function setRatio(r, btn) {
  document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  cropRatio = r;
  if (r !== 'free') {
    const [rw, rh] = r.split(':').map(Number);
    const ratio = rw / rh;
    const newH = box.w / ratio;
    if (box.y + newH <= 100) {
      box.h = newH;
    } else {
      box.w = box.h * ratio;
    }
    updateCropBox();
  }
}

function applyRotation(val) {
  cropRotation = Number(val);
  // show the current angle next to the slider
  const sign = cropRotation > 0 ? '+' : '';
  document.getElementById('degreeReadout').textContent = sign + cropRotation + '°';
  applyCropTransform();
  setTimeout(updateCropBox, 50);
}

// single place that builds the combined transform for zoom, pan, and rotation
function applyCropTransform() {
  const img = document.getElementById('cropImg');
  img.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomScale}) rotate(${cropRotation}deg)`;
}

// briefly flash the zoom level badge so the user knows where they are
let zoomBadgeTimer;
function showZoomBadge() {
  const badge = document.getElementById('zoomBadge');
  badge.textContent = zoomScale.toFixed(1) + '×';
  badge.classList.add('show');
  clearTimeout(zoomBadgeTimer);
  zoomBadgeTimer = setTimeout(() => badge.classList.remove('show'), 1200);
}

// ── DRAG LOGIC ──
let dragState = null;

// hardened minimum — at least 5% of the image so you can't make an invisible crop
const MIN_CROP = 5;

function initCropDrag() {
  const cropBox = document.getElementById('cropBox');

  // convert a screen point to image-relative percentages,
  // accounting for current zoom and pan
  function getRelPos(e) {
    const imgR = document.getElementById('cropImg').getBoundingClientRect();
    const workR = document.getElementById('cropWorkspace').getBoundingClientRect();
    const offX = imgR.left - workR.left;
    const offY = imgR.top - workR.top;
    const touch = e.touches ? e.touches[0] : e;
    return {
      x: ((touch.clientX - workR.left - offX) / imgR.width) * 100,
      y: ((touch.clientY - workR.top - offY) / imgR.height) * 100
    };
  }

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function onStart(e) {
    e.preventDefault();
    const pos = getRelPos(e);
    const handle = e.target.dataset.handle;
    dragState = { handle: handle || 'move', startPos: pos, startBox: { ...box } };
    if (!handle) cropBox.classList.add('moving');
  }

  function onMove(e) {
    if (!dragState) return;
    e.preventDefault();
    const pos = getRelPos(e);
    const dx = pos.x - dragState.startPos.x;
    const dy = pos.y - dragState.startPos.y;
    const sb = dragState.startBox;
    let { x, y, w, h } = sb;
    const ratio = cropRatio === 'free' ? null : (() => { const [rw,rh] = cropRatio.split(':').map(Number); return rw/rh; })();

    const h_str = dragState.handle;
    if (h_str === 'move') {
      x = clamp(sb.x + dx, 0, 100 - w);
      y = clamp(sb.y + dy, 0, 100 - h);
    } else {
      if (h_str.includes('r')) { w = clamp(sb.w + dx, MIN_CROP, 100 - sb.x); }
      if (h_str.includes('l')) {
        const newX = clamp(sb.x + dx, 0, sb.x + sb.w - MIN_CROP);
        w = sb.w - (newX - sb.x); x = newX;
      }
      if (h_str.includes('b')) { h = clamp(sb.h + dy, MIN_CROP, 100 - sb.y); }
      if (h_str.includes('t')) {
        const newY = clamp(sb.y + dy, 0, sb.y + sb.h - MIN_CROP);
        h = sb.h - (newY - sb.y); y = newY;
      }
      if (ratio) {
        // corner handles always drive width, height follows the ratio
        h = w / ratio;
      }
      x = clamp(x, 0, 100); y = clamp(y, 0, 100);
      w = clamp(w, MIN_CROP, 100 - x); h = clamp(h, MIN_CROP, 100 - y);
    }
    box = { x, y, w, h };
    updateCropBox();
  }

  function onEnd() {
    dragState = null;
    cropBox.classList.remove('moving');
  }

  cropBox.addEventListener('mousedown', onStart);
  cropBox.addEventListener('touchstart', onStart, { passive: false });
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchend', onEnd);

  cropBox.querySelectorAll('.handle').forEach(h => {
    h.addEventListener('mousedown', onStart);
    h.addEventListener('touchstart', onStart, { passive: false });
  });
}

initCropDrag();

// ── PINCH-TO-ZOOM & PAN ──
// two-finger pinch zooms the image, single-finger drag on the workspace
// (outside the crop box) pans when zoomed in
(function initZoomPan() {
  const workspace = document.getElementById('cropWorkspace');
  let pinchState = null;  // tracks active pinch gesture
  let panState = null;    // tracks single-finger pan
  let lastTap = 0;        // for double-tap detection

  // figure out the distance between two touch points
  function touchDist(t1, t2) {
    const dx = t1.clientX - t2.clientX;
    const dy = t1.clientY - t2.clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }

  // clamp pan so image edges don't drift too far from the workspace
  function clampPan() {
    if (zoomScale <= 1) { panX = 0; panY = 0; return; }
    const img = document.getElementById('cropImg');
    const workR = workspace.getBoundingClientRect();
    // how much extra space the zoom creates on each side
    const extraX = (img.offsetWidth * (zoomScale - 1)) / 2;
    const extraY = (img.offsetHeight * (zoomScale - 1)) / 2;
    panX = Math.max(-extraX, Math.min(extraX, panX));
    panY = Math.max(-extraY, Math.min(extraY, panY));
  }

  workspace.addEventListener('touchstart', (e) => {
    // let the crop box handle its own touches
    if (e.target.closest('.crop-box')) return;

    if (e.touches.length === 2) {
      // starting a pinch — remember initial distance and scale
      e.preventDefault();
      pinchState = {
        startDist: touchDist(e.touches[0], e.touches[1]),
        startScale: zoomScale,
        startPanX: panX,
        startPanY: panY,
        startMidX: (e.touches[0].clientX + e.touches[1].clientX) / 2,
        startMidY: (e.touches[0].clientY + e.touches[1].clientY) / 2
      };
      panState = null;
    } else if (e.touches.length === 1 && zoomScale > 1) {
      // single finger on zoomed image — start panning
      e.preventDefault();
      panState = {
        startX: e.touches[0].clientX,
        startY: e.touches[0].clientY,
        startPanX: panX,
        startPanY: panY
      };
    }
  }, { passive: false });

  workspace.addEventListener('touchmove', (e) => {
    if (e.target.closest('.crop-box')) return;

    if (pinchState && e.touches.length === 2) {
      // active pinch — scale proportionally to finger spread
      e.preventDefault();
      const dist = touchDist(e.touches[0], e.touches[1]);
      const ratio = dist / pinchState.startDist;
      zoomScale = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, pinchState.startScale * ratio));

      // pan follows the midpoint shift so zoom feels centered between fingers
      const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      panX = pinchState.startPanX + (midX - pinchState.startMidX);
      panY = pinchState.startPanY + (midY - pinchState.startMidY);

      clampPan();
      applyCropTransform();
      updateCropBox();
      showZoomBadge();
    } else if (panState && e.touches.length === 1) {
      // single-finger pan while zoomed in
      e.preventDefault();
      panX = panState.startPanX + (e.touches[0].clientX - panState.startX);
      panY = panState.startPanY + (e.touches[0].clientY - panState.startY);
      clampPan();
      applyCropTransform();
      updateCropBox();
    }
  }, { passive: false });

  workspace.addEventListener('touchend', (e) => {
    if (e.target.closest('.crop-box')) return;

    // pinch ended
    if (pinchState && e.touches.length < 2) {
      pinchState = null;
      // snap back to 1× if they barely zoomed
      if (zoomScale < 1.05) {
        zoomScale = 1; panX = 0; panY = 0;
        applyCropTransform();
        updateCropBox();
        showZoomBadge();
      }
    }
    if (e.touches.length === 0) {
      panState = null;

      // double-tap detection — toggle between fit and 3× zoom
      const now = Date.now();
      if (now - lastTap < 300) {
        e.preventDefault();
        if (zoomScale > 1.05) {
          // zoomed in — snap back to fit
          zoomScale = 1; panX = 0; panY = 0;
        } else {
          // at 1× — zoom to 3× centered on tap point
          zoomScale = 3;
          panX = 0; panY = 0;
        }
        clampPan();
        applyCropTransform();
        updateCropBox();
        showZoomBadge();
        lastTap = 0;
      } else {
        lastTap = now;
      }
    }
  }, { passive: false });

  // mouse wheel zoom for desktop testing
  workspace.addEventListener('wheel', (e) => {
    if (e.target.closest('.crop-box')) return;
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    zoomScale = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoomScale * delta));
    if (zoomScale < 1.05) { zoomScale = 1; panX = 0; panY = 0; }
    clampPan();
    applyCropTransform();
    updateCropBox();
    showZoomBadge();
  }, { passive: false });
})();

window.addEventListener('resize', () => {
  if (!document.getElementById('crop').classList.contains('hidden')) {
    updateCropBox();
  }
});

// ── SAVE ──
function saveCrop() {
  const img = document.getElementById('cropImg');
  const src = img.src;
  const tmpImg = new Image();
  tmpImg.onload = () => {
    const srcW = tmpImg.naturalWidth, srcH = tmpImg.naturalHeight;
    const rad = cropRotation * Math.PI / 180;
    const cos = Math.abs(Math.cos(rad)), sin = Math.abs(Math.sin(rad));
    const rotW = srcW * cos + srcH * sin;
    const rotH = srcH * cos + srcW * sin;

    const offCanvas = document.createElement('canvas');
    offCanvas.width = rotW; offCanvas.height = rotH;
    const ctx = offCanvas.getContext('2d');
    ctx.translate(rotW/2, rotH/2);
    ctx.rotate(rad);
    ctx.drawImage(tmpImg, -srcW/2, -srcH/2);

    const cx = (box.x / 100) * rotW;
    const cy = (box.y / 100) * rotH;
    const cw = (box.w / 100) * rotW;
    const ch = (box.h / 100) * rotH;

    const outCanvas = document.createElement('canvas');
    outCanvas.width = Math.max(1, cw);
    outCanvas.height = Math.max(1, ch);
    outCanvas.getContext('2d').drawImage(offCanvas, cx, cy, cw, ch, 0, 0, cw, ch);

    const finalURL = outCanvas.toDataURL('image/jpeg', 0.92);
    const ts = Date.now();
    saved.unshift({ id: ts, dataURL: finalURL });
    localStorage.setItem('booklens_saves', JSON.stringify(saved));
    updateCount();

    const a = document.createElement('a');
    a.href = finalURL;
    a.download = `booklens_${ts}.jpg`;
    a.click();

    showToast('Saved to Downloads ✓');
    showScreen('home');
  };
  tmpImg.src = src;
}

// ── GALLERY ──
function renderGallery() {
  const grid = document.getElementById('galleryGrid');
  if (!saved.length) {
    grid.innerHTML = '<div class="empty-gallery"><p>📖</p><p>No saved quotes yet.</p></div>';
    return;
  }
  grid.innerHTML = saved.map((item, i) => `
    <div class="gallery-item" onclick="toggleSelected(this)">
      <img src="${item.dataURL}" alt="saved quote">
      <div class="gallery-item-actions">
        <button class="item-btn" onclick="event.stopPropagation();extractText(${i})">Aa</button>
        <button class="item-btn" onclick="event.stopPropagation();downloadItem('${item.id}')">↓</button>
        <button class="item-btn" onclick="event.stopPropagation();reCrop(${i})">✂</button>
        <button class="item-btn" onclick="event.stopPropagation();deleteItem('${item.id}')">✕</button>
      </div>
    </div>
  `).join('');
}

function toggleSelected(el) {
  el.classList.toggle('selected');
}

function downloadItem(id) {
  const item = saved.find(s => s.id == id);
  if (!item) return;
  const a = document.createElement('a');
  a.href = item.dataURL; a.download = `booklens_${id}.jpg`; a.click();
}

function reCrop(idx) {
  openCrop(saved[idx].dataURL);
  saved.splice(idx, 1);
  localStorage.setItem('booklens_saves', JSON.stringify(saved));
}

function deleteItem(id) {
  saved = saved.filter(s => s.id != id);
  localStorage.setItem('booklens_saves', JSON.stringify(saved));
  renderGallery(); updateCount();
  showToast('Deleted');
}

// ── OCR ──
// lazy-init the Tesseract worker so we only load the ~10MB language data on first use
let ocrWorker = null;

async function getOCRWorker() {
  if (!ocrWorker) {
    // Tesseract.js v4 — create worker with progress logging
    ocrWorker = await Tesseract.createWorker({
      logger: (m) => {
        if (m.progress !== undefined) {
          const pct = Math.round(m.progress * 100);
          document.getElementById('ocrProgressFill').style.width = pct + '%';
          document.getElementById('ocrProgressLabel').textContent =
            (m.status || 'Processing') + '... ' + pct + '%';
        }
      }
    });
    await ocrWorker.loadLanguage('eng');
    await ocrWorker.initialize('eng');
  }
  return ocrWorker;
}

// kick off OCR on a gallery item
async function extractText(idx) {
  const item = saved[idx];
  if (!item) return;

  // show the overlay with progress bar
  const overlay = document.getElementById('ocrOverlay');
  const progress = document.getElementById('ocrProgress');
  const textArea = document.getElementById('ocrText');
  const actions = document.getElementById('ocrActions');

  progress.style.display = 'flex';
  textArea.style.display = 'none';
  actions.style.display = 'none';
  document.getElementById('ocrProgressFill').style.width = '0%';
  document.getElementById('ocrProgressLabel').textContent = 'Initializing...';
  overlay.classList.add('show');

  try {
    const worker = await getOCRWorker();
    const { data: { text } } = await worker.recognize(item.dataURL);

    // show the result in an editable textarea so the user can fix OCR mistakes
    textArea.value = text.trim();
    progress.style.display = 'none';
    textArea.style.display = 'block';
    actions.style.display = 'flex';
  } catch(e) {
    console.error('OCR error:', e);
    showToast('OCR failed — try again');
    overlay.classList.remove('show');
  }
}

function copyOCRText() {
  const text = document.getElementById('ocrText').value;
  navigator.clipboard.writeText(text).then(() => {
    showToast('Copied to clipboard');
  }).catch(() => {
    // fallback for older browsers
    document.getElementById('ocrText').select();
    document.execCommand('copy');
    showToast('Copied to clipboard');
  });
}

function closeOCR() {
  document.getElementById('ocrOverlay').classList.remove('show');
}

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

updateCount();

// register service worker for offline support and PWA install
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(reg => console.log('SW registered, scope:', reg.scope))
    .catch(err => console.warn('SW registration failed:', err));
}
